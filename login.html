<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-primary d-flex align-items-center" style="height:100vh;">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow-lg">
        <div class="card-header text-center bg-dark text-white">
          <h4>Admin Login</h4>
        </div>
        <div class="card-body">
          <form method="POST">
            <input name="username" class="form-control mb-3" placeholder="Username">
            <input name="password" type="password" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-dark w-100">Login</button>
          </form>
          <p class="text-danger text-center mt-2">{{ error }}</p>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
