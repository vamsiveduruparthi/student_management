<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
    margin:0;
    padding:0;
    height:100vh;

    /* background image */
    background-image: url("/static/images/background.jpg");
    background-size: cover;
    background-position: center;

    /* center the login box */
    display:flex;
    justify-content:center;
    align-items:center;
}

/* login container */
.login-box{
    background: rgba(255,255,255,0.9);
    padding:40px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    text-align:center;
    width:300px;
}

.login-box h2{
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

.login-box button{
    width:100%;
    padding:10px;
    background:#2c7be5;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.login-box button:hover{
    background:#1a5fd1;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username">

<input type="password" name="password" placeholder="Password">

<button type="submit">Login</button>

</form>

</div>

</body>
</html>
