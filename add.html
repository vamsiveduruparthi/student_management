<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-lg">
                <div class="card-header bg-primary text-white text-center">
                    <h4>Add Student</h4>
                </div>

                <div class="card-body">

                    <form method="POST">

                        <!-- BASIC INFO -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <input name="name" class="form-control" placeholder="Full Name">
                            </div>

                            <div class="col-md-6 mb-3">
                                <input name="age" class="form-control" placeholder="Age">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <input name="course" class="form-control" placeholder="Course">
                            </div>

                            <div class="col-md-6 mb-3">
                                <input name="email" class="form-control" placeholder="Email">
                            </div>
                        </div>

                        <div class="mb-3">
                            <input name="phone" class="form-control" placeholder="Phone Number">
                        </div>

                        <!-- GENDER -->
                        <label class="fw-bold">Gender</label><br>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" value="Male">
                            <label class="form-check-label">Male</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" value="Female">
                            <label class="form-check-label">Female</label>
                        </div>
                        <div class="form-check form-check-inline mb-3">
                            <input class="form-check-input" type="radio" name="gender" value="Other">
                            <label class="form-check-label">Other</label>
                        </div>

                        <!-- DOB -->
                        <div class="mb-3">
                            <label class="fw-bold">Date of Birth</label>
                            <input type="date" name="date_of_birth" class="form-control">
                        </div>

                        <div class="mb-3">
                            <input name="department" class="form-control" placeholder="Department">
                        </div>

                        <!-- YEAR -->
                        <label class="fw-bold">Year of Study</label><br>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="year_of_study" value="1st Year">
                            <label class="form-check-label">1st Year</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="year_of_study" value="2nd Year">
                            <label class="form-check-label">2nd Year</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="year_of_study" value="3rd Year">
                            <label class="form-check-label">3rd Year</label>
                        </div>
                        <div class="form-check form-check-inline mb-3">
                            <input class="form-check-input" type="radio" name="year_of_study" value="4th Year">
                            <label class="form-check-label">4th Year</label>
                        </div>

                        <div class="mb-3">
                            <input name="city" class="form-control" placeholder="City">
                        </div>

                        <div class="mb-3">
                            <input name="gpa" class="form-control" placeholder="GPA">
                        </div>

                        <!-- BUTTONS -->
                        <div class="d-grid gap-2">
                            <button class="btn btn-success">Save Student</button>
                            <a href="/students" class="btn btn-secondary">Back</a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
